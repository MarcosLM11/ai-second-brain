[paths]
wiki_root   = "~/brain/wiki"
raw_sources = "~/brain/raw"
graph_db    = "~/brain/brain_graph.db"
schema_file = "~/brain/SCHEMA.md"

[graph]
max_bfs_hops       = 3
max_context_tokens = 2000
god_nodes_top_n    = 10
community_count    = 5
surprise_min_conf  = 0.7

[capture]
# Sessions are saved as raw files in ~/brain/raw/sessions/ for manual ingestion via /ingest
enabled = false
